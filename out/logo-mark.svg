<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="35%" stop-color="#84CC16"/>
      <stop offset="65%" stop-color="#EAB308"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="25%" y1="15%" x2="75%" y2="85%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
  </defs>

  <!-- Ring arc: 10 o'clock (green) clockwise ~300° to 1 o'clock (orange) -->
  <!-- Center (50,50), radius 36, gap at upper-right -->
  <path
    d="M 18.8 32 A 36 36 0 1 0 68 18.8"
    fill="none"
    stroke="url(#ringGradient)"
    stroke-width="8"
    stroke-linecap="round"
  />

  <!-- Leaf: base lower-left, tip upper-right -->
  <path
    d="M 36 65 C 14 50, 40 16, 62 30 C 85 44, 60 74, 36 65 Z"
    fill="url(#leafGradient)"
  />

  <!-- Leaf vein -->
  <path
    d="M 36 65 Q 51 50, 62 30"
    fill="none"
    stroke="#166534"
    stroke-width="1.6"
    stroke-linecap="round"
  />
</svg>
